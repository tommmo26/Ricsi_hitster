<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hitster</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 80px;
  background-color: #121212;
  color: white;
}

button {
  font-size: 28px;
  padding: 20px 50px;
  cursor: pointer;
  background-color: #1DB954;
  color: white;
  border: none;
  border-radius: 50px;
  font-weight: bold;
  transition: transform 0.2s;
}

button:active {
  transform: scale(0.95);
}

#status {
  margin-top: 30px;
  font-size: 24px;
  font-weight: bold;
  height: 40px;
}
</style>
</head>

<body>

<h1>🎵 Hitster</h1>

<p id="status">Készen állsz a zenére?</p>

<button onclick="startGame()">▶ INDÍTÁS</button>

<script>
let songs = {};
let loaded = false;

// JSON betöltése
fetch("music.json")
  .then(res => res.json())
  .then(data => {
    songs = data;
    loaded = true;
  });

// QR / URL ID
const id = new URLSearchParams(window.location.search).get("id");

function startGame() {
  const statusText = document.getElementById("status");

  // Betöltés ellenőrzés
  if (!loaded) {
    statusText.innerText = "⏳ Betöltés...";
    return;
  }

  // ID ellenőrzés
  if (!id || !songs[id]) {
    statusText.innerText = "❌ Nincs ilyen kártya!";
    return;
  }

  // Játék indul
  statusText.innerText = "🎧 Füleket hegyezni...";

  setTimeout(() => {
    statusText.innerText = "3️⃣...";
  }, 1000);

  setTimeout(() => {
    statusText.innerText = "2️⃣...";
  }, 2000);

  setTimeout(() => {
    statusText.innerText = "1️⃣...";
  }, 3000);

  setTimeout(() => {
    statusText.innerText = "🎶 BUMM! Mi ez a szám?";
    statusText.style.color = "#1DB954";

    // Spotify megnyitás
    window.location.href = songs[id];

  }, 4000);
}
</script>

</body>
</html>
