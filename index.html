<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hitster</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 80px;
}

button {
  font-size: 28px;
  padding: 20px 50px;
  cursor: pointer;
}

#status {
  margin-top: 20px;
  font-size: 18px;
}
</style>

<body>

<h1>🎵 Hitster</h1>

<p id="status">Készen állsz a zenére?</p>

<button onclick="startGame()">▶ INDÍTÁS</button>

<script>
const songs = {
  "001": "https://open.spotify.com/track/3Dy4REq8O09llgiwuHQ3sk?si=e89cacfdaf90447a",
  "002": "https://open.spotify.com/track/1TfqLAPs4K3s2rJMoCokcS?si=7e33207563e54ab2",

  "004": "https://open.spotify.com/track/2goLsvvODILDzeeiT4dAoR?si=055471018b9e405a",
  "005": "https://open.spotify.com/track/0M2QC4tPJmNqRhd4NfOZgz?si=45496fa8f7754dd7",
  "006": "https://open.spotify.com/track/4r8lRYnoOGdEi6Yyl5OC1o?si=f17d988cb35043d6",
  "007": "https://open.spotify.com/track/5Hyr47BBGpvOfcykSCcaw9?si=f17e32f056af4ec8",
  "008": "https://open.spotify.com/track/2zYzyRzz6PrmhPzyfMEC8s?si=421073532b264932",
  "009": "https://open.spotify.com/track/6habFhsOp2NvshLv26DqMb?si=3dd62a8b4a1d4d85",
  "010": "https://open.spotify.com/track/6naxalmloLFWR0siv8dnQQ?si=c955faca51484e54",

  "013": "https://open.spotify.com/track/64BbkK9SFKH2jk86U3dGj2P?si=d5ffdb9e7241433c",
  "014": "https://open.spotify.com/track/2wUlYDGGXlSvm2NkGj0Qio?si=1ee0db1747ed4b50",
  "015": "https://open.spotify.com/track/3Te8uLyit6X3ncNW8Fp3K2?si=cd7839360c2f4dcc",

const id = new URLSearchParams(window.location.search).get("id");

function startGame() {
  if (!songs[id]) {
    document.getElementById("status").innerText = "❌ Nincs ilyen kártya!";
    return;
  }

  // játék feeling
  document.getElementById("status").innerText = "🎧 Figyelj... indul!";

  setTimeout(() => {
    // Új lapon nyitja meg, így a Hitster weboldalad nyitva marad a mobilon
    window.open(songs[id], "_blank");
  }, 2000);
}
</script>

</body>
</html>
