const id = new URLSearchParams(window.location.search).get("id");

function startGame() {
  if (!songs[id]) {
    document.getElementById("status").innerText = "❌ Nincs ilyen kártya!";
    return;
  }

  const statusText = document.getElementById("status");
  
  // 1. fázis: Figyelemfelkeltés
  statusText.innerText = "🎧 Füleket hegyezni...";

  // 2. fázis: Visszaszámlálás a feszültség fokozásáért
  setTimeout(() => { statusText.innerText = "3️⃣..."; }, 1000);
  setTimeout(() => { statusText.innerText = "2️⃣..."; }, 2000);
  setTimeout(() => { statusText.innerText = "1️⃣..."; }, 3000);
  
  // 3. fázis: Indítás!
  setTimeout(() => {
    statusText.innerText = "🎶 BUMM! Mi ez a szám?";
    window.open(songs[id], "_blank");
  }, 4000);
}
