<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hitster</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 80px;
  background-color: #121212; /* Sötét mód a jobb hangulatért */
  color: white;
}

button {
  font-size: 28px;
  padding: 20px 50px;
  cursor: pointer;
  background-color: #1DB954; /* Spotify zöld */
  color: white;
  border: none;
  border-radius: 50px;
  font-weight: bold;
  transition: transform 0.2s;
}

button:active {
  transform: scale(0.95);
}

#status {
  margin-top: 30px;
  font-size: 24px;
  font-weight: bold;
  height: 40px; /* Fix magasság, hogy ne ugráljon a gomb */
}
</style>
</head>

<body>

<button onclick="startGame()">▶ INDÍTÁS</button>

  "004": "https://www.google.com/search?q=https://api.qrserver.com/v1/create-qr-code/%3Fsize%3D150x150%26data%3Dhttps://open.spotify.com/track/3Te8uLyit6X3ncNW8Fp3K2%3Fsi%3Dcd7839360c2f4dcc",
  "005": "https://www.google.com/search?q=https://api.qrserver.com/v1/create-qr-code/%3Fsize%3D150x150%26data%3Dhttps://open.spotify.com/track/15tHagkk8z306XkyOHqiip%3Fsi%3D776b70e2bcbd4b11",
  "006": "https://www.google.com/search?q=https://api.qrserver.com/v1/create-qr-code/%3Fsize%3D150x150%26data%3Dhttps://open.spotify.com/track/0M2QC4tPJmnNqRhd4NfOZg%3Fsi%3D45496fa8f7754dd7",

  "010": "https://www.google.com/search?q=https://api.qrserver.com/v1/create-qr-code/%3Fsize%3D150x150%26data%3Dhttps://open.spotify.com/track/3Dy4REq8O09llgiwuHQ3sk%3Fsi%3De89cacfdaf90447a",

};

const id = new URLSearchParams(window.location.search).get("id");

function startGame() {
  if (!songs[id]) {
    document.getElementById("status").innerText = "❌ Nincs ilyen kártya!";
    return;
  }

  const statusText = document.getElementById("status");
  
  // 1. fázis: Figyelemfelkeltés
  statusText.innerText = "🎧 Füleket hegyezni...";

  // 2. fázis: Visszaszámlálás a feszültség fokozásáért
  setTimeout(() => { statusText.innerText = "3️⃣..."; }, 1000);
  setTimeout(() => { statusText.innerText = "2️⃣..."; }, 2000);
  setTimeout(() => { statusText.innerText = "1️⃣..."; }, 3000);
  
  // 3. fázis: Indítás!
  setTimeout(() => {
    statusText.innerText = "🎶 BUMM! Mi ez a szám?";
    window.open(songs[id], "_blank");
  }, 4000);
}
</script>

</body>
</html>
