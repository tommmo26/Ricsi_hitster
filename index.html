<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hitster</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 80px;
}

button {
  font-size: 28px;
  padding: 20px 50px;
  cursor: pointer;
}

#status {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🎵 Hitster</h1>

<p id="status">Készen állsz a zenére?</p>

<button onclick="startGame()">▶ INDÍTÁS</button>

<script>
const songs = {
  "001": "https://open.spotify.com/track/3Dy4REq8O09IlgiwuHQ3sk"
};

const id = new URLSearchParams(window.location.search).get("id");

function startGame() {
  if (!songs[id]) {
    document.getElementById("status").innerText = "❌ Nincs ilyen kártya!";
    return;
  }

  // játék feeling
  document.getElementById("status").innerText = "🎧 Figyelj... indul!";

  setTimeout(() => {
    window.open(songs[id], "_blank");
  }, 2000);
}
</script>

</body>
</html>
